<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saiful | .NET Developer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), #0b0b0b),
    url('https://images.unsplash.com/photo-1519389950473-47ba0277781c') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    color: gold;
    font-size: 60px;
    margin: 0;
}

.hero p {
    font-size: 20px;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    background: rgba(0,0,0,0.9);
    position: sticky;
    top: 0;
}

.navbar a {
    padding: 15px 25px;
    color: white;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
}

.navbar a:hover {
    color: gold;
}

/* SECTION */
.section {
    display: none;
    padding: 60px;
    text-align: center;
}

.active {
    display: block;
}

/* CARDS */
.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.card {
    display: block;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    width: 260px;
    border-radius: 10px;
    border: 1px solid gold;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.card:hover {
    background: purple;
    transform: translateY(-10px);
    box-shadow: 0 0 20px purple;
}
</style>

</head>
<body>

<!-- NAV -->
<nav class="navbar">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('projects')">Projects</a>
    <a onclick="showSection('skills')">Skills</a>
    <a onclick="showSection('contact')">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Saiful</h1>
    <p>.NET Developer</p>
</div>

<!-- ABOUT -->
<div id="about" class="section active">
    <h2>About</h2>
    <p>I am a .NET Developer skilled in C#, ASP.NET Core, SQL Server.</p>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
    <h2>Projects</h2>

    <div class="card-container">
        <a href="https://github.com/Saif8252/Hospital-Management-System" target="_blank" class="card">
            Hospital Management System
        </a>
    </div>
</div>

<!-- SKILLS -->
<div id="skills" class="section">
    <h2>Skills</h2>
    <p>C#, ASP.NET, SQL</p>
</div>

<!-- CONTACT (FIXED MESSAGE SECTION) -->
<div id="contact" class="section">
    <h2>Contact</h2>

    <div class="card-container">
        <a href="mailto:msisaif1999@gmail.com" class="card">
            Email Me
        </a>

        <a href="https://wa.me/8801862208252" target="_blank" class="card">
            WhatsApp Me
        </a>
    </div>
</div>

<script>
function showSection(id) {
    let sections = document.querySelectorAll('.section');

    sections.forEach(sec => {
        sec.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
